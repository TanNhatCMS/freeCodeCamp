# FreeCodeCamp Workflow Update Dependencies Multiple Packages

## Action

Follow the update-dependencies-multiple-packages workflow:
1. Identify outdated dependencies in multiple package.json files.
2. Update the version numbers for those dependencies in each relevant package.json.
3. Update the pnpm-lock.yaml (or equivalent lockfile) to reflect new dependency versions.
4. Commit all changed package.json files and the lockfile together.

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: */package.json, pnpm-lock.yaml

